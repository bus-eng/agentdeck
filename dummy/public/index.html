<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AgentDeck" />
  <meta name="theme-color" content="#0a0a14" />
  <link rel="icon" href="/icon-32.png" />
  <link rel="apple-touch-icon" href="/icon-180.png" />
  <title>AgentDeck</title>

  <style>
    /* ── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Design tokens ──────────────────────────────────────────────────── */
    :root {
      /* Background layers */
      --bg-base:       #0a0a14;
      --bg-deep:       #020206;
      --bg-surface:    #0f101e;
      --bg-elevated:   #141428;
      --bg-hover:      #1a1b32;
      --bg-card-hover: #1c1d36; /* slightly lighter than bg-hover for cards */

      /* Brand accents */
      --violet:        #a78bfa;
      --violet-dark:   #7c6df2;
      --violet-dim:    rgba(167, 139, 250, 0.15);
      --violet-glow:   rgba(167, 139, 250, 0.08);
      --teal:          #2dd4bf;
      --cyan:          #22d3ee;
      --rose:          #fb7185;
      --rose-dim:      rgba(251, 113, 133, 0.12);
      --danger:        #fb7185;

      /* Text */
      --text-primary:    #e2e8f0;
      --text-secondary:  #94a3b8;
      --text-tertiary:   #64748b;
      --text-on-violet:  #0a0a14;

      /* Borders */
      --border:        rgba(167, 139, 250, 0.12);
      --border-subtle: rgba(255, 255, 255, 0.05);

      /* Gradients */
      --grad-brand:    linear-gradient(135deg, #a78bfa 0%, #2dd4bf 100%);
      --grad-bubble-user: linear-gradient(135deg, #a78bfa 0%, #7c6df2 100%);

      /* Spacing (4px scale) */
      --s1: 4px;
      --s2: 8px;
      --s3: 12px;
      --s4: 16px;
      --s5: 20px;
      --s6: 24px;
      --s8: 32px;
      --s10: 40px;
      --s12: 48px;

      /* Layout */
      --topbar-h:    56px;
      --chips-h:     44px;
      --composer-min-h: 60px;
      --sidebar-w:   280px;

      /* Typography */
      --font-sans:  -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --font-mono:  "Menlo", "Consolas", "DejaVu Sans Mono", "Courier New", monospace;

      /* Radius */
      --radius-sm:  4px;
      --radius-md:  12px;
      --radius-lg:  16px;
      --radius-xl:  20px;
      --radius-full: 9999px;

      /* Transitions */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in:  cubic-bezier(0.4, 0, 1, 1);
    }

    /* ── Base ────────────────────────────────────────────────────────────── */
    html {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── App shell — mobile: column, desktop: sidebar + main ────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: var(--vv-h, 100dvh);
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* Desktop: topbar full-width, then sidebar+chat in a row */
    @media (min-width: 900px) {
      #app {
        display: grid;
        grid-template-rows: var(--topbar-h) 1fr;
        grid-template-columns: var(--sidebar-w) 1fr;
        grid-template-areas:
          "topbar topbar"
          "sidebar chat-col";
      }

      #topbar {
        grid-area: topbar;
      }

      #sidebar {
        grid-area: sidebar;
        position: sticky;
        top: 0;
        /* sidebar fills remaining height below topbar */
        height: calc(100dvh - var(--topbar-h) - env(safe-area-inset-top));
      }

      #chat-col {
        grid-area: chat-col;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      /* Hide hamburger on desktop */
      #btn-hamburger {
        display: none !important;
      }

      /* Hide drawer backdrop on desktop */
      #drawer-backdrop {
        display: none !important;
      }
    }

    /* ── Topbar ──────────────────────────────────────────────────────────── */
    #topbar {
      flex-shrink: 0;
      height: var(--topbar-h);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 var(--s4);
      gap: var(--s3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      z-index: 20;
    }

    /* Hamburger — only visible on mobile */
    #btn-hamburger {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--s2);
      color: var(--text-secondary);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 150ms var(--ease-out), color 150ms var(--ease-out);
    }

    #btn-hamburger:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    #btn-hamburger:active {
      transform: scale(0.95);
    }

    #btn-hamburger svg {
      width: 18px;
      height: 18px;
    }

    #topbar-brand {
      display: flex;
      align-items: center;
      gap: var(--s2);
      flex: 1;
      min-width: 0;
    }

    #topbar-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--s2);
      flex-shrink: 0;
      object-fit: cover;
    }

    #topbar-info {
      display: flex;
      flex-direction: column;
      gap: 0;
      min-width: 0;
    }

    #topbar-name {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.2;
      background: var(--grad-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    #topbar-cwd {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      line-height: 1.2;
    }

    /* Topbar actions */
    #topbar-actions {
      display: flex;
      align-items: center;
      gap: var(--s2);
      flex-shrink: 0;
    }

    .topbar-btn {
      display: flex;
      align-items: center;
      gap: var(--s1);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--s2);
      padding: var(--s1) var(--s3);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 150ms var(--ease-out), border-color 150ms var(--ease-out), color 150ms var(--ease-out);
      min-height: 32px;
      white-space: nowrap;
    }

    .topbar-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .topbar-btn:active {
      transform: scale(0.97);
    }

    .topbar-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    #btn-kill {
      color: var(--rose);
      border-color: rgba(251, 113, 133, 0.25);
    }

    #btn-kill:hover {
      background: var(--rose-dim);
      border-color: rgba(251, 113, 133, 0.4);
      color: var(--rose);
    }

    /* ── Sidebar / Drawer ────────────────────────────────────────────────── */
    #sidebar {
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* Mobile: off-canvas drawer */
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      z-index: 40;
      transform: translateX(-100%);
      transition: transform 250ms var(--ease-out);
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-bottom: env(safe-area-inset-bottom);
      will-change: transform;
    }

    #sidebar.open {
      transform: translateX(0);
    }

    /* Desktop: sidebar is in-flow (not fixed) */
    @media (min-width: 900px) {
      #sidebar {
        position: sticky; /* overridden by grid area — just remove fixed */
        transform: none !important;
        transition: none;
        /* Reset safe areas — topbar handles top already */
        padding-top: 0;
        padding-left: 0;
        overflow-y: auto;
      }

      #sidebar.open {
        transform: none;
      }
    }

    /* Drawer backdrop — mobile only */
    #drawer-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 20, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 35;
      opacity: 0;
      transition: opacity 250ms var(--ease-out);
    }

    #drawer-backdrop.visible {
      display: block;
      opacity: 1;
    }

    /* ── Sidebar inner layout ────────────────────────────────────────────── */
    #sidebar-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      padding: var(--s4);
      display: flex;
      flex-direction: column;
      gap: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #sidebar-content::-webkit-scrollbar {
      width: 3px;
    }

    #sidebar-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: var(--radius-full);
    }

    /* Section headers */
    .sidebar-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--s3);
    }

    .sidebar-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.01em;
    }

    /* + button */
    .btn-add-project {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-tertiary);
      cursor: pointer;
      transition: background 150ms var(--ease-out), border-color 150ms var(--ease-out), color 150ms var(--ease-out);
      flex-shrink: 0;
    }

    .btn-add-project:hover {
      background: var(--violet-dim);
      border-color: rgba(167, 139, 250, 0.35);
      color: var(--violet);
    }

    .btn-add-project:focus-visible {
      outline: 2px solid var(--violet);
      outline-offset: 2px;
    }

    .btn-add-project svg {
      width: 16px;
      height: 16px;
    }

    /* Projects list */
    #projects-list {
      display: flex;
      flex-direction: column;
      gap: var(--s2);
      margin-bottom: var(--s4);
    }

    /* Project card */
    .project-card {
      display: flex;
      align-items: center;
      gap: var(--s2);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 12px 10px 12px 14px;
      cursor: pointer;
      transition: background 150ms var(--ease-out), border-color 150ms var(--ease-out);
      text-align: left;
      width: 100%;
      min-height: 56px;
      animation: card-in 200ms var(--ease-out) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .project-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border);
    }

    .project-card:focus-visible {
      outline: 2px solid var(--violet);
      outline-offset: 2px;
    }

    .project-card-body {
      flex: 1;
      min-width: 0;
    }

    .project-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .project-card-path {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
      line-height: 1.3;
    }

    .project-card-delete {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--text-tertiary);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 150ms var(--ease-out), color 150ms var(--ease-out);
      /* Prevent card click from firing when deleting */
      pointer-events: auto;
    }

    .project-card-delete:hover {
      background: var(--rose-dim);
      color: var(--danger);
    }

    .project-card-delete:focus-visible {
      outline: 2px solid var(--danger);
      outline-offset: 2px;
    }

    .project-card-delete svg {
      width: 14px;
      height: 14px;
    }

    /* Inline delete confirm */
    .project-card-confirm {
      display: none;
      align-items: center;
      gap: var(--s2);
      background: var(--bg-card-hover);
      border: 1px solid rgba(251, 113, 133, 0.25);
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: var(--s1);
      animation: card-in 150ms var(--ease-out) both;
    }

    .project-card-confirm.visible {
      display: flex;
    }

    .project-card-confirm span {
      flex: 1;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .confirm-btn {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      min-height: 28px;
      transition: opacity 150ms;
    }

    .confirm-btn.cancel {
      background: var(--bg-hover);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .confirm-btn.delete {
      background: var(--rose-dim);
      color: var(--danger);
      border: 1px solid rgba(251, 113, 133, 0.3);
    }

    .confirm-btn:hover {
      opacity: 0.8;
    }

    /* Projects empty state */
    #projects-empty {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: var(--s3);
      padding: var(--s8) var(--s4);
      text-align: center;
    }

    #projects-empty.visible {
      display: flex;
    }

    #projects-empty p {
      font-size: 13px;
      color: var(--text-tertiary);
      line-height: 1.5;
    }

    #projects-empty-cta {
      font-size: 13px;
      font-weight: 500;
      color: var(--violet);
      background: var(--violet-dim);
      border: 1px solid rgba(167, 139, 250, 0.25);
      border-radius: var(--radius-full);
      padding: var(--s2) var(--s4);
      cursor: pointer;
      transition: background 150ms var(--ease-out), border-color 150ms var(--ease-out);
      min-height: 36px;
    }

    #projects-empty-cta:hover {
      background: rgba(167, 139, 250, 0.22);
      border-color: rgba(167, 139, 250, 0.4);
    }

    /* Sidebar divider */
    .sidebar-divider {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: var(--s4) 0;
    }

    /* Action chips — vertical */
    #action-chips {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: var(--s4);
    }

    .action-chip {
      display: flex;
      align-items: center;
      gap: var(--s3);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--s2);
      padding: 10px 12px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      width: 100%;
      text-align: left;
      min-height: 44px;
      transition: background 150ms var(--ease-out), border-color 150ms var(--ease-out), color 150ms var(--ease-out);
      user-select: none;
      -webkit-user-select: none;
    }

    .action-chip:hover {
      background: var(--bg-card-hover);
      border-color: var(--border);
      color: var(--text-primary);
    }

    .action-chip:active {
      background: var(--violet-dim);
      color: var(--violet);
    }

    .action-chip:focus-visible {
      outline: 2px solid var(--violet);
      outline-offset: 2px;
    }

    .action-chip svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      color: var(--text-tertiary);
    }

    .action-chip:hover svg,
    .action-chip:active svg {
      color: var(--violet);
    }

    /* Sidebar footer */
    #sidebar-footer {
      flex-shrink: 0;
      padding: var(--s3) var(--s4);
      border-top: 1px solid var(--border-subtle);
      text-align: center;
    }

    #sidebar-footer span {
      font-size: 11px;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
    }

    /* ── Chat column (desktop: takes remaining space) ────────────────────── */
    #chat-col {
      display: contents; /* on mobile: transparent wrapper, children join the flex column */
    }

    @media (min-width: 900px) {
      #chat-col {
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }
    }

    /* ── Chat area ───────────────────────────────────────────────────────── */
    #chat-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    #chat-inner {
      display: flex;
      flex-direction: column;
      gap: var(--s4);
      padding: var(--s6) var(--s4) var(--s4);
      min-height: 100%;
    }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: var(--s4);
      padding: var(--s12) var(--s6);
      text-align: center;
    }

    #empty-state img {
      width: 80px;
      height: 80px;
      border-radius: var(--s4);
      opacity: 0.9;
    }

    #empty-state h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    #empty-state p {
      font-size: 14px;
      color: var(--text-tertiary);
      max-width: 280px;
      line-height: 1.6;
    }

    #empty-cta-project {
      font-size: 14px;
      font-weight: 500;
      color: var(--violet);
      background: var(--violet-dim);
      border: 1px solid rgba(167, 139, 250, 0.25);
      border-radius: var(--radius-full);
      padding: var(--s2) var(--s5);
      cursor: pointer;
      transition: background 150ms var(--ease-out), border-color 150ms var(--ease-out);
      min-height: 44px;
      display: none; /* shown via JS when projects list is empty */
    }

    #empty-cta-project.visible {
      display: inline-flex;
      align-items: center;
      gap: var(--s2);
    }

    #empty-cta-project:hover {
      background: rgba(167, 139, 250, 0.22);
      border-color: rgba(167, 139, 250, 0.4);
    }

    #empty-cta-project svg {
      width: 16px;
      height: 16px;
    }

    /* ── Message bubbles ─────────────────────────────────────────────────── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: var(--s2);
      animation: msg-in 200ms var(--ease-out) both;
    }

    @keyframes msg-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    .msg-row.agent {
      flex-direction: row;
    }

    .msg-row.system {
      justify-content: center;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: var(--s1);
      flex-shrink: 0;
      align-self: flex-end;
      object-fit: cover;
      opacity: 0.85;
    }

    .msg-no-avatar {
      width: 28px;
      flex-shrink: 0;
    }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-width: 82%;
    }

    .msg-row.user .msg-content {
      align-items: flex-end;
      max-width: 75%;
    }

    .msg-bubble {
      padding: var(--s3) var(--s4);
      font-family: var(--font-mono);
      font-size: 13.5px;
      line-height: 1.6;
      word-break: break-word;
      position: relative;
    }

    .msg-row.user .msg-bubble {
      background: var(--grad-bubble-user);
      color: var(--text-on-violet);
      border-radius: var(--radius-lg) var(--radius-sm) var(--radius-lg) var(--radius-lg);
    }

    .msg-row.agent .msg-bubble {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
      white-space: pre-wrap;
      tab-size: 2;
    }

    .msg-row.system .msg-bubble {
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
      color: var(--text-tertiary);
      font-family: var(--font-sans);
      font-size: 12px;
      padding: var(--s1) var(--s4);
      display: flex;
      align-items: center;
      gap: var(--s2);
    }

    .msg-row.system .msg-bubble svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      color: var(--text-tertiary);
    }

    /* Streaming indicator */
    .msg-bubble.streaming::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 14px;
      background: var(--teal);
      border-radius: 2px;
      margin-left: 4px;
      vertical-align: text-bottom;
      animation: blink-cursor 700ms steps(2) infinite;
    }

    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .msg-timestamp {
      font-size: 10px;
      color: var(--text-tertiary);
      padding: 0 var(--s1);
      opacity: 0.6;
    }

    /* Show-more fold */
    .msg-fold {
      display: none;
      align-items: center;
      gap: var(--s2);
      font-size: 12px;
      color: var(--violet);
      cursor: pointer;
      padding: var(--s1) 0;
      background: none;
      border: none;
    }

    .msg-fold.visible {
      display: flex;
    }

    .msg-fold svg {
      width: 14px;
      height: 14px;
    }

    /* ── Typing indicator ────────────────────────────────────────────────── */
    #typing-indicator {
      display: none;
      align-items: center;
      gap: var(--s2);
      padding: 0 var(--s4);
      animation: msg-in 200ms var(--ease-out) both;
    }

    #typing-indicator.visible {
      display: flex;
    }

    .typing-avatar {
      width: 28px;
      height: 28px;
      border-radius: var(--s1);
      object-fit: cover;
      opacity: 0.85;
    }

    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg);
      padding: var(--s3) var(--s4);
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--violet);
      animation: typing-bounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(1) { animation-delay: 0ms; }
    .typing-dot:nth-child(2) { animation-delay: 150ms; }
    .typing-dot:nth-child(3) { animation-delay: 300ms; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Quick chips bar ─────────────────────────────────────────────────── */
    #chips-bar {
      flex-shrink: 0;
      height: var(--chips-h);
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 var(--s4);
      gap: var(--s2);
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    #chips-bar::-webkit-scrollbar {
      display: none;
    }

    .key-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--s2);
      padding: 0 var(--s3);
      height: 30px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 100ms, border-color 100ms, color 100ms;
      user-select: none;
      -webkit-user-select: none;
    }

    .key-chip:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: rgba(167, 139, 250, 0.25);
    }

    .key-chip:active {
      background: var(--violet-dim);
      color: var(--violet);
    }

    /* ── Composer ────────────────────────────────────────────────────────── */
    #composer-wrap {
      flex-shrink: 0;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      padding: var(--s3) var(--s4);
      padding-bottom: calc(var(--s3) + env(safe-area-inset-bottom));
    }

    #composer {
      display: flex;
      align-items: flex-end;
      gap: var(--s3);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--s2) var(--s2) var(--s2) var(--s4);
      transition: border-color 150ms var(--ease-out);
    }

    #composer:focus-within {
      border-color: rgba(167, 139, 250, 0.4);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.08);
    }

    #composer-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 16px;
      line-height: 1.5;
      max-height: calc(6 * 1.5 * 16px);
      overflow-y: auto;
      scrollbar-width: none;
      caret-color: var(--teal);
      -webkit-appearance: none;
    }

    #composer-input::-webkit-scrollbar {
      display: none;
    }

    #composer-input::placeholder {
      color: var(--text-tertiary);
    }

    #btn-send {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--grad-brand);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 150ms var(--ease-out), transform 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
    }

    #btn-send:disabled {
      opacity: 0.3;
      cursor: default;
    }

    #btn-send:not(:disabled):hover {
      box-shadow: 0 2px 12px rgba(167, 139, 250, 0.4);
    }

    #btn-send:not(:disabled):active {
      transform: scale(0.94);
    }

    #btn-send svg {
      width: 20px;
      height: 20px;
      color: #0a0a14;
    }

    /* ── Overlay (disconnect) ────────────────────────────────────────────── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 20, 0.80);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: var(--s6);
      z-index: 50;
      animation: fade-in 200ms var(--ease-out) both;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #overlay.visible {
      display: flex;
    }

    #overlay-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--s4);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: var(--s8);
      max-width: 320px;
      width: calc(100% - var(--s8));
      text-align: center;
      animation: overlay-in 250ms var(--ease-out) both;
    }

    @keyframes overlay-in {
      from { opacity: 0; transform: translateY(16px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    #overlay-avatar {
      width: 64px;
      height: 64px;
      border-radius: var(--s3);
      opacity: 0.7;
    }

    #overlay-msg {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    #overlay-btn {
      background: var(--grad-brand);
      color: #0a0a14;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      padding: var(--s3) var(--s8);
      cursor: pointer;
      transition: opacity 150ms, transform 150ms;
      min-height: 44px;
    }

    #overlay-btn:hover { opacity: 0.9; }
    #overlay-btn:active { transform: scale(0.97); }

    /* ── Project modal ───────────────────────────────────────────────────── */
    #project-modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 20, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 60;
      padding: var(--s4);
    }

    #project-modal-backdrop.visible {
      display: flex;
      animation: fade-in 180ms var(--ease-out) both;
    }

    #project-modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--s6);
      width: 100%;
      max-width: 420px;
      animation: modal-in 180ms var(--ease-out) both;
      position: relative;
    }

    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    #project-modal h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--s5);
    }

    .modal-field {
      margin-bottom: var(--s4);
    }

    .modal-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: var(--s2);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .modal-input {
      display: block;
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--s2);
      padding: 10px var(--s3);
      color: var(--text-primary);
      font-size: 16px; /* prevents iOS zoom */
      font-family: var(--font-sans);
      outline: none;
      transition: border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
    }

    .modal-input.mono {
      font-family: var(--font-mono);
      font-size: 14px;
    }

    .modal-input:focus {
      border-color: rgba(167, 139, 250, 0.5);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
    }

    .modal-input[aria-invalid="true"] {
      border-color: var(--danger);
    }

    .modal-error {
      font-size: 12px;
      color: var(--danger);
      margin-top: var(--s1);
      min-height: 16px;
    }

    .modal-actions {
      display: flex;
      gap: var(--s3);
      justify-content: flex-end;
      margin-top: var(--s5);
    }

    .modal-btn-cancel {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--s2);
      padding: 10px var(--s4);
      cursor: pointer;
      min-height: 44px;
      transition: background 150ms var(--ease-out), color 150ms var(--ease-out);
    }

    .modal-btn-cancel:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .modal-btn-submit {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-on-violet);
      background: var(--grad-brand);
      border: none;
      border-radius: var(--s2);
      padding: 10px var(--s5);
      cursor: pointer;
      min-height: 44px;
      transition: opacity 150ms var(--ease-out), transform 150ms var(--ease-out);
      display: flex;
      align-items: center;
      gap: var(--s2);
    }

    .modal-btn-submit:hover {
      opacity: 0.9;
    }

    .modal-btn-submit:active {
      transform: scale(0.97);
    }

    .modal-btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .modal-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(10,10,20,0.3);
      border-top-color: #0a0a14;
      border-radius: 50%;
      animation: spin 600ms linear infinite;
      display: none;
    }

    .modal-btn-submit.loading .modal-spinner {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Scrollbar (desktop) ─────────────────────────────────────────────── */
    #chat-scroll::-webkit-scrollbar {
      width: 4px;
    }

    #chat-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat-scroll::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: var(--radius-full);
    }

    /* ── Reduced motion ──────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Desktop layout tweaks ───────────────────────────────────────────── */
    @media (min-width: 768px) {
      #chat-inner {
        max-width: 800px;
        margin: 0 auto;
        width: 100%;
        padding: var(--s8) var(--s6) var(--s6);
      }

      #typing-indicator {
        max-width: 800px;
        margin: 0 auto;
        padding: 0 var(--s6);
        width: 100%;
      }

      #composer-wrap {
        padding-left: calc((100% - 800px) / 2 + var(--s6));
        padding-right: calc((100% - 800px) / 2 + var(--s6));
      }

      #chips-bar {
        padding-left: calc((100% - 800px) / 2 + var(--s6));
        padding-right: calc((100% - 800px) / 2 + var(--s6));
      }
    }

    /* On desktop with sidebar, override the centering to not double-offset */
    @media (min-width: 900px) {
      #chat-inner {
        max-width: 760px;
        padding: var(--s8) var(--s6) var(--s6);
        margin: 0 auto;
      }

      #typing-indicator {
        max-width: 760px;
        padding: 0 var(--s6);
        margin: 0 auto;
      }

      #composer-wrap {
        padding-left: var(--s6);
        padding-right: var(--s6);
      }

      #chips-bar {
        padding-left: var(--s6);
        padding-right: var(--s6);
      }
    }

    @media (min-width: 768px) {
      .msg-content {
        max-width: 75%;
      }

      .msg-row.user .msg-content {
        max-width: 65%;
      }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ── Topbar ─────────────────────────────────────────────────────────── -->
  <header id="topbar" role="banner">
    <!-- Hamburger: mobile only, hidden ≥900px via CSS -->
    <button
      id="btn-hamburger"
      type="button"
      aria-label="Abrir menú"
      aria-expanded="false"
      aria-controls="sidebar"
    >
      <!-- Lucide: menu -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
      </svg>
    </button>

    <div id="topbar-brand">
      <img id="topbar-avatar" src="/icon-192.png" alt="AgentDeck" />
      <div id="topbar-info">
        <span id="topbar-name">AgentDeck</span>
        <span id="topbar-cwd" aria-label="Directorio actual">~/</span>
      </div>
    </div>
    <div id="topbar-actions">
      <button id="btn-kill" class="topbar-btn" aria-label="Matar proceso actual">
        <!-- Lucide: octagon-x -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        Kill
      </button>
      <button id="btn-logout" class="topbar-btn" aria-label="Cerrar sesión">
        <!-- Lucide: log-out -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>
  </header>

  <!-- ── Sidebar / Drawer ───────────────────────────────────────────────── -->
  <nav
    id="sidebar"
    aria-label="Proyectos y acciones"
  >
    <div id="sidebar-content">

      <!-- Projects section -->
      <div class="sidebar-section-header">
        <span class="sidebar-section-title">Proyectos</span>
        <button
          class="btn-add-project"
          type="button"
          id="btn-open-project-modal"
          aria-label="Nuevo proyecto"
        >
          <!-- Lucide: plus -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>

      <div id="projects-list" role="list" aria-label="Lista de proyectos">
        <!-- Populated by JS -->
      </div>

      <!-- Empty state -->
      <div id="projects-empty" role="status" aria-live="polite">
        <!-- Cat robot avatar reused from topbar -->
        <img src="/icon-192.png" alt="" aria-hidden="true" width="48" height="48" style="border-radius: 10px; opacity: 0.6;" />
        <p>Agregá tu primer proyecto</p>
        <button id="projects-empty-cta" type="button" aria-label="Nuevo proyecto">Nuevo proyecto</button>
      </div>

      <!-- Divider -->
      <hr class="sidebar-divider" aria-hidden="true" />

      <!-- Quick actions section -->
      <div class="sidebar-section-header">
        <span class="sidebar-section-title">Acciones rápidas</span>
      </div>

      <div id="action-chips" role="group" aria-label="Acciones rápidas">
        <button class="action-chip" type="button" data-cmd="ls ~" aria-label="Enviar comando ls ~ al chat">
          <!-- Lucide: chevron-right -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
          ls ~
        </button>
        <button class="action-chip" type="button" data-cmd="git status" aria-label="Enviar comando git status al chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
          git status
        </button>
        <button class="action-chip" type="button" data-cmd='claude --print "hola"' aria-label="Enviar comando claude --print al chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
          claude --print "hola"
        </button>
        <button class="action-chip" type="button" data-cmd="codex --help" aria-label="Enviar comando codex --help al chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
          codex --help
        </button>
        <button class="action-chip" type="button" data-cmd="pwd" aria-label="Enviar comando pwd al chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
          pwd
        </button>
      </div>

    </div>

    <!-- Sidebar footer -->
    <div id="sidebar-footer">
      <span>AgentDeck dummy v0.1</span>
    </div>
  </nav>

  <!-- Drawer backdrop (mobile only) -->
  <div
    id="drawer-backdrop"
    role="presentation"
    aria-hidden="true"
  ></div>

  <!-- ── Chat column ────────────────────────────────────────────────────── -->
  <div id="chat-col">

    <!-- Chat scroll zone -->
    <main id="chat-scroll" role="main" aria-label="Conversación" aria-live="polite" aria-atomic="false">
      <div id="chat-inner">

        <!-- Empty state -->
        <div id="empty-state" role="status">
          <img src="/icon-192.png" alt="" aria-hidden="true" />
          <h2>Tu agent deck local</h2>
          <p>Abrí un proyecto del menú o escribí un comando…</p>
          <button id="empty-cta-project" type="button" aria-label="Agregar primer proyecto">
            <!-- Lucide: folder-plus -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              <line x1="12" y1="11" x2="12" y2="17"/>
              <line x1="9" y1="14" x2="15" y2="14"/>
            </svg>
            Nuevo proyecto
          </button>
        </div>

      </div>
    </main>

    <!-- Typing indicator -->
    <div id="typing-indicator" role="status" aria-label="El agente está procesando">
      <img class="typing-avatar" src="/icon-192.png" alt="" aria-hidden="true" />
      <div class="typing-dots" aria-hidden="true">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <!-- Quick chips bar -->
    <div id="chips-bar" role="toolbar" aria-label="Teclas rápidas">
      <button class="key-chip" data-seq="\x1b"     type="button" aria-label="Escape">Esc</button>
      <button class="key-chip" data-seq="\t"        type="button" aria-label="Tab">Tab</button>
      <button class="key-chip" data-seq="\x03"      type="button" aria-label="Control C">Ctrl+C</button>
      <button class="key-chip" data-seq="\x04"      type="button" aria-label="Control D">Ctrl+D</button>
      <button class="key-chip" data-seq="\x0c"      type="button" aria-label="Control L">Ctrl+L</button>
      <button class="key-chip" data-seq="\x1b[A"    type="button" aria-label="Flecha arriba">&#8593;</button>
      <button class="key-chip" data-seq="\x1b[B"    type="button" aria-label="Flecha abajo">&#8595;</button>
      <button class="key-chip" data-cmd="clear"     type="button" aria-label="Limpiar terminal">clear</button>
    </div>

    <!-- Composer -->
    <section id="composer-wrap" aria-label="Compositor de comandos">
      <div id="composer">
        <textarea
          id="composer-input"
          rows="1"
          placeholder="Escribí un comando…"
          autocapitalize="none"
          autocorrect="off"
          spellcheck="false"
          autocomplete="off"
          inputmode="text"
          aria-label="Comando"
          aria-multiline="true"
        ></textarea>
        <button id="btn-send" type="button" disabled aria-label="Enviar comando">
          <!-- Lucide: arrow-up -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </section>

  </div><!-- /#chat-col -->

</div><!-- /#app -->

<!-- ── Disconnect overlay ─────────────────────────────────────────────── -->
<div id="overlay" role="alertdialog" aria-modal="true" aria-labelledby="overlay-msg">
  <div id="overlay-card">
    <img id="overlay-avatar" src="/icon-192.png" alt="AgentDeck mascot" />
    <p id="overlay-msg">Disconnected</p>
    <button id="overlay-btn" type="button">Reconnect</button>
  </div>
</div>

<!-- ── Project modal ──────────────────────────────────────────────────── -->
<div
  id="project-modal-backdrop"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modal-heading"
>
  <div id="project-modal">
    <h3 id="modal-heading">Nuevo proyecto</h3>

    <div class="modal-field">
      <label class="modal-label" for="modal-name">Nombre</label>
      <input
        id="modal-name"
        class="modal-input"
        type="text"
        autocapitalize="none"
        autocorrect="off"
        spellcheck="false"
        autocomplete="off"
        placeholder="mi-proyecto"
      />
      <div class="modal-error" id="modal-name-error" role="alert" aria-live="polite"></div>
    </div>

    <div class="modal-field">
      <label class="modal-label" for="modal-path">Ruta</label>
      <input
        id="modal-path"
        class="modal-input mono"
        type="text"
        autocapitalize="none"
        autocorrect="off"
        spellcheck="false"
        autocomplete="off"
        placeholder="~/code/miproyecto"
        inputmode="url"
      />
      <div class="modal-error" id="modal-path-error" role="alert" aria-live="polite"></div>
    </div>

    <div class="modal-actions">
      <button class="modal-btn-cancel" type="button" id="modal-btn-cancel">Cancelar</button>
      <button class="modal-btn-submit" type="button" id="modal-btn-submit">
        <div class="modal-spinner" aria-hidden="true"></div>
        Agregar
      </button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ────────────────────────────────────────────────────────────────────────
     Constants & state
  ──────────────────────────────────────────────────────────────────────── */
  const MAX_MESSAGES   = 200;
  const CHUNK_FOLD_KB  = 50;
  const STREAM_TIMEOUT = 700;

  let ws              = null;
  let intentionalClose = false;
  let streamBubble    = null;
  let streamTimer     = null;
  let streamingActive = false;
  let userScrolled    = false;

  // Projects state
  let projects        = [];       // [{id, name, path, createdAt}]
  let drawerOpen      = false;

  // Touch tracking for swipe-to-close
  let touchStartX     = 0;
  let touchStartY     = 0;

  /* ────────────────────────────────────────────────────────────────────────
     DOM refs
  ──────────────────────────────────────────────────────────────────────── */
  const chatScroll       = document.getElementById("chat-scroll");
  const chatInner        = document.getElementById("chat-inner");
  const emptyState       = document.getElementById("empty-state");
  const typingIndicator  = document.getElementById("typing-indicator");
  const composerInput    = document.getElementById("composer-input");
  const btnSend          = document.getElementById("btn-send");
  const overlay          = document.getElementById("overlay");
  const overlayMsg       = document.getElementById("overlay-msg");
  const overlayBtn       = document.getElementById("overlay-btn");
  const topbarCwd        = document.getElementById("topbar-cwd");

  // Drawer
  const sidebar          = document.getElementById("sidebar");
  const drawerBackdrop   = document.getElementById("drawer-backdrop");
  const btnHamburger     = document.getElementById("btn-hamburger");

  // Projects UI
  const projectsList     = document.getElementById("projects-list");
  const projectsEmpty    = document.getElementById("projects-empty");
  const projectsEmptyCta = document.getElementById("projects-empty-cta");
  const emptyChatCta     = document.getElementById("empty-cta-project");

  // Modal
  const modalBackdrop    = document.getElementById("project-modal-backdrop");
  const modalNameInput   = document.getElementById("modal-name");
  const modalPathInput   = document.getElementById("modal-path");
  const modalNameError   = document.getElementById("modal-name-error");
  const modalPathError   = document.getElementById("modal-path-error");
  const modalBtnCancel   = document.getElementById("modal-btn-cancel");
  const modalBtnSubmit   = document.getElementById("modal-btn-submit");
  const btnOpenModal     = document.getElementById("btn-open-project-modal");

  /* ────────────────────────────────────────────────────────────────────────
     Utilities
  ──────────────────────────────────────────────────────────────────────── */

  function now() {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  }

  function stripAnsi(str) {
    return str
      .replace(/\x1b\[[\?\!\>]?[0-9;:]*[A-Za-z@~]/g, "")
      .replace(/\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g, "")
      .replace(/\x1b[@-Z\\-_]/g, "")
      .replace(/\x1b[()#%][0-9A-Za-z]/g, "")
      .replace(/\r(?!\n)/g, "")
      .replace(/[\x00\x07\x08]/g, "");
  }

  function detectCwd(text) {
    const m = text.match(/(?:^|\n|\r)[^\r\n]*?([~\/][^\r\n$#%>]*)[#$%>]\s*$/m);
    if (m) {
      let path = m[1].trim();
      if (path.startsWith("/Users/") || path.startsWith("/home/")) {
        path = "~" + path.replace(/^\/[^/]+\/[^/]+/, "");
      }
      if (path) topbarCwd.textContent = path;
    }
  }

  function autoResize() {
    composerInput.style.height = "auto";
    const lineH = 16 * 1.5;
    const max   = lineH * 6;
    composerInput.style.height = Math.min(composerInput.scrollHeight, max) + "px";
    btnSend.disabled = composerInput.value.trim() === "";
  }

  function scrollToBottom(force = false) {
    if (force || !userScrolled) {
      chatScroll.scrollTo({ top: chatScroll.scrollHeight, behavior: "smooth" });
    }
  }

  chatScroll.addEventListener("scroll", () => {
    const distanceFromBottom = chatScroll.scrollHeight - chatScroll.scrollTop - chatScroll.clientHeight;
    userScrolled = distanceFromBottom > 80;
  }, { passive: true });

  function maybeHideEmpty() {
    if (emptyState && emptyState.parentNode === chatInner) {
      chatInner.removeChild(emptyState);
    }
  }

  function enforceMessageLimit() {
    const rows = chatInner.querySelectorAll(".msg-row");
    const excess = rows.length - MAX_MESSAGES;
    for (let i = 0; i < excess; i++) {
      rows[i].remove();
    }
  }

  /* ────────────────────────────────────────────────────────────────────────
     Focus trap utility
  ──────────────────────────────────────────────────────────────────────── */

  function getFocusable(container) {
    return Array.from(container.querySelectorAll(
      'a[href], button:not([disabled]), input:not([disabled]), textarea:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])'
    )).filter(el => !el.closest('[hidden]') && el.offsetParent !== null);
  }

  function trapFocus(container, e) {
    const focusable = getFocusable(container);
    if (!focusable.length) return;
    const first = focusable[0];
    const last  = focusable[focusable.length - 1];
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  }

  /* ────────────────────────────────────────────────────────────────────────
     Drawer
  ──────────────────────────────────────────────────────────────────────── */

  function openDrawer() {
    drawerOpen = true;
    sidebar.classList.add("open");
    drawerBackdrop.classList.add("visible");
    btnHamburger.setAttribute("aria-expanded", "true");
    if (!isDesktop()) {
      sidebar.setAttribute("role", "dialog");
      sidebar.setAttribute("aria-modal", "true");
    }
    // Focus first focusable in sidebar
    const focusable = getFocusable(sidebar);
    if (focusable.length) focusable[0].focus();
  }

  function closeDrawer() {
    drawerOpen = false;
    sidebar.classList.remove("open");
    drawerBackdrop.classList.remove("visible");
    btnHamburger.setAttribute("aria-expanded", "false");
    sidebar.removeAttribute("role");
    sidebar.removeAttribute("aria-modal");
    btnHamburger.focus();
  }

  function isDesktop() {
    return window.matchMedia("(min-width: 900px)").matches;
  }

  btnHamburger.addEventListener("click", () => {
    if (drawerOpen) { closeDrawer(); } else { openDrawer(); }
  });

  drawerBackdrop.addEventListener("click", closeDrawer);

  // Esc closes drawer/modal
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      if (modalBackdrop.classList.contains("visible")) {
        closeModal();
        return;
      }
      if (drawerOpen && !isDesktop()) {
        closeDrawer();
      }
    }
    // Focus trap for drawer on mobile
    if (e.key === "Tab" && drawerOpen && !isDesktop()) {
      trapFocus(sidebar, e);
    }
    // Focus trap for modal
    if (e.key === "Tab" && modalBackdrop.classList.contains("visible")) {
      trapFocus(modalBackdrop, e);
    }
  });

  // Swipe-to-close: detect left swipe on the sidebar
  sidebar.addEventListener("touchstart", (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  sidebar.addEventListener("touchend", (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    // Swipe left ≥80px and mostly horizontal
    if (dx < -80 && dy < 60 && drawerOpen && !isDesktop()) {
      closeDrawer();
    }
  }, { passive: true });

  // Close drawer on mobile after project open (called later)
  function closeMobileDrawer() {
    if (!isDesktop() && drawerOpen) closeDrawer();
  }

  /* ────────────────────────────────────────────────────────────────────────
     Message factory functions
  ──────────────────────────────────────────────────────────────────────── */

  function addUserMessage(text) {
    maybeHideEmpty();
    const row = document.createElement("div");
    row.className = "msg-row user";
    row.setAttribute("role", "listitem");

    const content = document.createElement("div");
    content.className = "msg-content";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = text;

    const ts = document.createElement("div");
    ts.className = "msg-timestamp";
    ts.setAttribute("aria-label", `Enviado a las ${now()}`);
    ts.textContent = now();

    content.appendChild(bubble);
    content.appendChild(ts);
    row.appendChild(content);

    chatInner.appendChild(row);
    enforceMessageLimit();
    scrollToBottom(true);
    return row;
  }

  function openAgentBubble() {
    maybeHideEmpty();
    const row = document.createElement("div");
    row.className = "msg-row agent";
    row.setAttribute("role", "listitem");

    const avatar = document.createElement("img");
    avatar.className = "msg-avatar";
    avatar.src = "/icon-192.png";
    avatar.alt = "";
    avatar.setAttribute("aria-hidden", "true");

    const content = document.createElement("div");
    content.className = "msg-content";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble streaming";
    bubble.setAttribute("aria-live", "polite");

    const ts = document.createElement("div");
    ts.className = "msg-timestamp";

    content.appendChild(bubble);
    content.appendChild(ts);
    row.appendChild(avatar);
    row.appendChild(content);

    chatInner.appendChild(row);
    enforceMessageLimit();

    return { row, bubble, ts };
  }

  function closeAgentBubble() {
    if (!streamBubble) return;
    streamBubble.classList.remove("streaming");

    if (streamBubble.textContent.length > CHUNK_FOLD_KB * 1024) {
      const fullText = streamBubble.textContent;
      const preview  = fullText.slice(0, CHUNK_FOLD_KB * 50);
      streamBubble.textContent = preview;

      const fold = document.createElement("button");
      fold.className = "msg-fold visible";
      fold.type = "button";
      fold.setAttribute("aria-expanded", "false");
      fold.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg> Mostrar más`;
      fold.addEventListener("click", () => {
        streamBubble.textContent = fullText;
        fold.remove();
        scrollToBottom();
      });
      streamBubble.parentNode.insertBefore(fold, streamBubble.nextSibling);
    }

    streamBubble = null;
    streamingActive = false;
    typingIndicator.classList.remove("visible");
  }

  function addSystemMessage(text, iconSvg) {
    const row = document.createElement("div");
    row.className = "msg-row system";
    row.setAttribute("role", "listitem");

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";

    if (iconSvg) {
      const iconWrapper = document.createElement("span");
      iconWrapper.setAttribute("aria-hidden", "true");
      iconWrapper.innerHTML = iconSvg;
      bubble.appendChild(iconWrapper);
    }

    const textNode = document.createTextNode(text);
    bubble.appendChild(textNode);

    row.appendChild(bubble);
    chatInner.appendChild(row);
    enforceMessageLimit();
    scrollToBottom(true);
  }

  /* ────────────────────────────────────────────────────────────────────────
     PTY output
  ──────────────────────────────────────────────────────────────────────── */

  function onPtyOutput(raw) {
    const text = stripAnsi(raw);
    if (!text) return;

    detectCwd(raw);

    if (!streamBubble) {
      const { bubble, ts } = openAgentBubble();
      streamBubble = bubble;
      streamBubble._tsEl = ts;
    }

    streamBubble.textContent += text;

    if (!streamingActive) {
      streamingActive = true;
      typingIndicator.classList.add("visible");
    }

    scrollToBottom();

    clearTimeout(streamTimer);
    streamTimer = setTimeout(() => {
      if (streamBubble && streamBubble._tsEl) {
        streamBubble._tsEl.textContent = now();
        streamBubble._tsEl.setAttribute("aria-label", `Recibido a las ${now()}`);
      }
      closeAgentBubble();
    }, STREAM_TIMEOUT);
  }

  /* ────────────────────────────────────────────────────────────────────────
     Send command
  ──────────────────────────────────────────────────────────────────────── */

  function sendCommand(text) {
    if (!text.trim()) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      addSystemMessage("No hay conexión al shell. Reconectando…");
      return;
    }

    clearTimeout(streamTimer);
    if (streamBubble) closeAgentBubble();

    addUserMessage(text);
    ws.send(JSON.stringify({ t: "in", d: text + "\n" }));

    composerInput.value = "";
    autoResize();
    composerInput.focus();

    const { bubble, ts } = openAgentBubble();
    streamBubble = bubble;
    streamBubble._tsEl = ts;
  }

  /* ────────────────────────────────────────────────────────────────────────
     WebSocket
  ──────────────────────────────────────────────────────────────────────── */

  function connect() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${proto}//${location.host}/ws/terminal`);

    ws.onopen = () => {
      hideOverlay();
      addSystemMessage("Conectado al shell.");
      ws.send(JSON.stringify({ t: "in", d: "" }));
    };

    ws.onmessage = (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch { return; }

      if (msg.t === "out") {
        onPtyOutput(msg.d);
      } else if (msg.t === "exit") {
        closeAgentBubble();
        addSystemMessage(`Shell terminó (código ${msg.code ?? "?"}).`);
        showOverlay(`Shell exited (code ${msg.code ?? "?"})`, "Reconnect", () => location.reload());
      } else if (msg.t === "cwd" && msg.d) {
        topbarCwd.textContent = msg.d;
      }
    };

    ws.onerror = () => {};

    ws.onclose = (ev) => {
      if (intentionalClose) return;
      if (ev.code === 4401) {
        location.href = "/login";
        return;
      }
      closeAgentBubble();
      addSystemMessage("Conexión perdida.");
      showOverlay("Disconnected", "Reconnect", () => location.reload());
    };
  }

  /* ────────────────────────────────────────────────────────────────────────
     Overlay helpers
  ──────────────────────────────────────────────────────────────────────── */

  function showOverlay(msg, btnLabel, action) {
    overlayMsg.textContent = msg;
    overlayBtn.textContent = btnLabel;
    overlayBtn.onclick = action ?? (() => location.reload());
    overlay.classList.add("visible");
  }

  function hideOverlay() {
    overlay.classList.remove("visible");
  }

  /* ────────────────────────────────────────────────────────────────────────
     Projects — API
  ──────────────────────────────────────────────────────────────────────── */

  async function fetchProjects() {
    try {
      const res = await fetch("/projects", { credentials: "include" });
      if (!res.ok) return;
      const data = await res.json();
      projects = data.items || [];
      renderProjects();
    } catch {}
  }

  async function createProject(name, path) {
    const res = await fetch("/projects", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, path }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || err.message || `Error ${res.status}`);
    }
    return res.json();
  }

  async function deleteProject(id) {
    const res = await fetch(`/projects/${id}`, {
      method: "DELETE",
      credentials: "include",
    });
    if (!res.ok) throw new Error(`Error ${res.status}`);
  }

  async function openProject(id) {
    const res = await fetch(`/projects/${id}/open`, {
      method: "POST",
      credentials: "include",
    });
    if (!res.ok) throw new Error(`Error ${res.status}`);
    return res.json();
  }

  /* ────────────────────────────────────────────────────────────────────────
     Projects — render
  ──────────────────────────────────────────────────────────────────────── */

  function renderProjects() {
    // Clear existing cards (not the empty-state div)
    projectsList.innerHTML = "";

    if (projects.length === 0) {
      projectsEmpty.classList.add("visible");
      // Show CTA in chat empty state too
      if (emptyChatCta) emptyChatCta.classList.add("visible");
      return;
    }

    projectsEmpty.classList.remove("visible");
    if (emptyChatCta) emptyChatCta.classList.remove("visible");

    projects.forEach((proj, idx) => {
      const wrapper = document.createElement("div");
      wrapper.style.animationDelay = `${idx * 30}ms`;

      const card = document.createElement("button");
      card.className = "project-card";
      card.type = "button";
      card.setAttribute("role", "listitem");
      card.setAttribute("aria-label", `Abrir proyecto ${proj.name}`);
      card.dataset.projectId = proj.id;

      const body = document.createElement("div");
      body.className = "project-card-body";

      const nameEl = document.createElement("div");
      nameEl.className = "project-card-name";
      nameEl.textContent = proj.name;

      const pathEl = document.createElement("div");
      pathEl.className = "project-card-path";
      pathEl.textContent = proj.path;
      pathEl.title = proj.path;

      body.appendChild(nameEl);
      body.appendChild(pathEl);

      const delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "project-card-delete";
      delBtn.setAttribute("aria-label", `Eliminar proyecto ${proj.name}`);
      delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

      card.appendChild(body);
      card.appendChild(delBtn);
      wrapper.appendChild(card);

      // Inline confirm row
      const confirmRow = document.createElement("div");
      confirmRow.className = "project-card-confirm";
      confirmRow.setAttribute("role", "group");
      confirmRow.setAttribute("aria-label", `Confirmar eliminación de ${proj.name}`);

      const confirmMsg = document.createElement("span");
      confirmMsg.textContent = `¿Eliminar "${proj.name}"?`;

      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button";
      cancelBtn.className = "confirm-btn cancel";
      cancelBtn.textContent = "No";
      cancelBtn.setAttribute("aria-label", "Cancelar eliminación");

      const doDeleteBtn = document.createElement("button");
      doDeleteBtn.type = "button";
      doDeleteBtn.className = "confirm-btn delete";
      doDeleteBtn.textContent = "Eliminar";
      doDeleteBtn.setAttribute("aria-label", `Confirmar eliminación de ${proj.name}`);

      confirmRow.appendChild(confirmMsg);
      confirmRow.appendChild(cancelBtn);
      confirmRow.appendChild(doDeleteBtn);
      wrapper.appendChild(confirmRow);
      projectsList.appendChild(wrapper);

      // Events
      // Open project on card click (not on delete button)
      card.addEventListener("click", async (e) => {
        if (e.target === delBtn || delBtn.contains(e.target)) return;
        try {
          const data = await openProject(proj.id);
          if (data && data.needsSession) {
            addSystemMessage("Abrí una sesión escribiendo un comando primero.");
          } else {
            // Lucide folder-open icon inline
            const folderIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0;" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="2 10 22 10"/></svg>`;
            addSystemMessage(`Abierto: ${proj.name}`, folderIcon);
            closeMobileDrawer();
          }
        } catch {
          addSystemMessage(`Error al abrir ${proj.name}.`);
        }
      });

      // Delete button shows confirm row
      delBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        confirmRow.classList.add("visible");
        cancelBtn.focus();
      });

      cancelBtn.addEventListener("click", () => {
        confirmRow.classList.remove("visible");
        delBtn.focus();
      });

      doDeleteBtn.addEventListener("click", async () => {
        try {
          await deleteProject(proj.id);
          projects = projects.filter(p => p.id !== proj.id);
          wrapper.remove();
          if (projects.length === 0) {
            projectsEmpty.classList.add("visible");
            if (emptyChatCta) emptyChatCta.classList.add("visible");
          }
        } catch {
          addSystemMessage(`Error al eliminar ${proj.name}.`);
          confirmRow.classList.remove("visible");
        }
      });
    });
  }

  /* ────────────────────────────────────────────────────────────────────────
     Project modal
  ──────────────────────────────────────────────────────────────────────── */

  let previousFocus = null;

  function openModal() {
    previousFocus = document.activeElement;
    modalNameInput.value = "";
    modalPathInput.value = "";
    clearModalErrors();
    modalBackdrop.classList.add("visible");
    modalNameInput.focus();
  }

  function closeModal() {
    modalBackdrop.classList.remove("visible");
    modalBtnSubmit.classList.remove("loading");
    modalBtnSubmit.disabled = false;
    clearModalErrors();
    if (previousFocus) previousFocus.focus();
  }

  function clearModalErrors() {
    modalNameError.textContent = "";
    modalPathError.textContent = "";
    modalNameInput.removeAttribute("aria-invalid");
    modalPathInput.removeAttribute("aria-invalid");
  }

  function setModalError(inputEl, errorEl, msg) {
    inputEl.setAttribute("aria-invalid", "true");
    errorEl.textContent = msg;
  }

  btnOpenModal.addEventListener("click", openModal);
  projectsEmptyCta.addEventListener("click", openModal);
  if (emptyChatCta) emptyChatCta.addEventListener("click", openModal);

  modalBtnCancel.addEventListener("click", closeModal);

  // Click outside modal card
  modalBackdrop.addEventListener("click", (e) => {
    if (e.target === modalBackdrop) closeModal();
  });

  modalBtnSubmit.addEventListener("click", async () => {
    clearModalErrors();
    const name = modalNameInput.value.trim();
    const path = modalPathInput.value.trim();
    let valid = true;

    if (!name) {
      setModalError(modalNameInput, modalNameError, "El nombre es requerido.");
      valid = false;
    }
    if (!path) {
      setModalError(modalPathInput, modalPathError, "La ruta es requerida.");
      valid = false;
    }
    if (!valid) return;

    modalBtnSubmit.classList.add("loading");
    modalBtnSubmit.disabled = true;

    try {
      const proj = await createProject(name, path);
      projects.push(proj);
      renderProjects();
      closeModal();
    } catch (err) {
      // Show error on path field (most likely invalid path)
      setModalError(modalPathInput, modalPathError, err.message || "Error al crear el proyecto.");
      modalBtnSubmit.classList.remove("loading");
      modalBtnSubmit.disabled = false;
      modalPathInput.focus();
    }
  });

  // Submit on Enter in name field
  modalNameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); modalPathInput.focus(); }
  });
  modalPathInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); modalBtnSubmit.click(); }
  });

  /* ────────────────────────────────────────────────────────────────────────
     Composer events
  ──────────────────────────────────────────────────────────────────────── */

  composerInput.addEventListener("input", autoResize);

  composerInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey && !e.altKey) {
      e.preventDefault();
      const val = composerInput.value.trim();
      if (val) sendCommand(val);
    }
  });

  btnSend.addEventListener("click", () => {
    const val = composerInput.value.trim();
    if (val) sendCommand(val);
  });

  /* ────────────────────────────────────────────────────────────────────────
     Quick chips bar (key chips — existing behavior preserved)
  ──────────────────────────────────────────────────────────────────────── */

  function parseSeq(raw) {
    return raw
      .replace(/\\x([0-9a-fA-F]{2})/g, (_, h) => String.fromCharCode(parseInt(h, 16)))
      .replace(/\\t/g, "\t")
      .replace(/\\r/g, "\r");
  }

  document.querySelectorAll(".key-chip").forEach((chip) => {
    chip.addEventListener("mousedown", (e) => e.preventDefault());
    chip.addEventListener("touchstart", (e) => e.preventDefault(), { passive: false });

    chip.addEventListener("click", (e) => {
      e.preventDefault();

      if (chip.dataset.seq) {
        const seq = parseSeq(chip.dataset.seq);
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ t: "in", d: seq }));
        }
      } else if (chip.dataset.cmd) {
        sendCommand(chip.dataset.cmd);
      }

      composerInput.focus();
    });
  });

  /* ────────────────────────────────────────────────────────────────────────
     Action chips (drawer) — reuse sendCommand + closeMobileDrawer
  ──────────────────────────────────────────────────────────────────────── */

  document.querySelectorAll(".action-chip").forEach((chip) => {
    // Same pattern as key-chips: prevent focus steal from textarea
    chip.addEventListener("mousedown", (e) => e.preventDefault());
    chip.addEventListener("touchstart", (e) => e.preventDefault(), { passive: false });

    chip.addEventListener("click", (e) => {
      e.preventDefault();
      const cmd = chip.dataset.cmd;
      if (cmd) {
        sendCommand(cmd);
        closeMobileDrawer();
      }
      composerInput.focus();
    });
  });

  /* ────────────────────────────────────────────────────────────────────────
     Kill / Logout
  ──────────────────────────────────────────────────────────────────────── */

  document.getElementById("btn-kill").addEventListener("click", async () => {
    try {
      await fetch("/kill", { method: "POST" });
      addSystemMessage("Proceso terminado (Kill enviado).");
      clearTimeout(streamTimer);
      closeAgentBubble();
    } catch {
      addSystemMessage("Error al enviar Kill.");
    }
  });

  document.getElementById("btn-logout").addEventListener("click", async () => {
    intentionalClose = true;
    if (ws) ws.close();
    try { await fetch("/logout", { method: "POST" }); } catch {}
    location.href = "/login";
  });

  /* ────────────────────────────────────────────────────────────────────────
     VisualViewport — iOS PWA keyboard resize fix
     Updates --vv-h so #app shrinks when the software keyboard opens,
     keeping the composer and chips-bar above the keyboard at all times.
  ──────────────────────────────────────────────────────────────────────── */

  function applyVV() {
    const vv = window.visualViewport;
    if (!vv) return;
    const h = Math.round(vv.height + vv.offsetTop);
    document.documentElement.style.setProperty("--vv-h", h + "px");
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", applyVV);
    window.visualViewport.addEventListener("scroll", applyVV);
    applyVV();
  }

  /* ────────────────────────────────────────────────────────────────────────
     Init
  ──────────────────────────────────────────────────────────────────────── */

  autoResize();
  connect();
  fetchProjects();

})();
</script>
</body>
</html>
