<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AgentDeck" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  <title>AgentDeck — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(ellipse at top, #141428 0%, #0a0a14 60%, #020206 100%);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: rgba(15, 16, 30, 0.85);
      border: 1px solid rgba(167, 139, 250, 0.18);
      border-radius: 20px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 360px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(167, 139, 250, 0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo img {
      width: 88px;
      height: 88px;
      display: block;
      margin: 0 auto 0.75rem;
      border-radius: 22px;
      filter: drop-shadow(0 8px 24px rgba(45, 212, 191, 0.25));
    }

    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #c4b5fd 0%, #2dd4bf 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo p {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.25rem;
      letter-spacing: 0.02em;
    }

    .error-banner {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.625rem 0.875rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      color: #94a3b8;
      margin-bottom: 0.375rem;
    }

    input[type="password"], input[type="text"] {
      display: block;
      width: 100%;
      background: rgba(2, 6, 23, 0.8);
      border: 1px solid #2a2a44;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      margin-bottom: 0.875rem;
    }

    input[type="password"]:focus, input[type="text"]:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.12);
    }

    button[type="submit"] {
      margin-top: 0.5rem;
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #a78bfa 0%, #7c6df2 100%);
      color: #0a0a14;
      border: none;
      border-radius: 10px;
      padding: 0.875rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(167, 139, 250, 0.3);
    }

    button[type="submit"]:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(167, 139, 250, 0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/icon-192.png" alt="AgentDeck" />
      <h1>AgentDeck</h1>
      <p>your local agent deck · LAN only</p>
    </div>

    <div id="error-banner" class="error-banner" style="display:none">
      Wrong passphrase — try again.
    </div>

    <form method="POST" action="/login" id="login-form">
      <label for="username">Usuario</label>
      <input
        id="username"
        name="username"
        type="text"
        autocomplete="username"
        autocapitalize="none"
        autocorrect="off"
        spellcheck="false"
        required
      />

      <label for="passphrase">Passphrase</label>
      <input
        id="passphrase"
        name="passphrase"
        type="password"
        autocomplete="current-password"
        required
      />

      <button type="submit">Enter</button>
    </form>
  </div>

  <script>
    if (new URLSearchParams(location.search).get("error") === "1") {
      document.getElementById("error-banner").style.display = "block";
    }
  </script>
</body>
</html>
