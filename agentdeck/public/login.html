<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F5F2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="AgentDeck" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  <link rel="manifest" href="/manifest.json" />
  <title>AgentDeck</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(180deg, #FBFAF8 0%, #F7F5F2 100%);
      color: #1F2933;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #FFFFFF;
      border: 1px solid #E6E1D8;
      border-radius: 28px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 48px rgba(31,41,51,0.06);
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo img {
      width: 72px; height: 72px; border-radius: 18px;
      box-shadow: 0 10px 24px rgba(109,93,246,0.10);
      margin-bottom: 0.75rem;
    }
    .logo h1 {
      font-size: 1.75rem; font-weight: 700; letter-spacing: -0.04em;
      color: #1F2933;
    }
    .logo p { font-size: 0.8125rem; color: #6B7280; margin-top: 0.25rem; }
    .error-banner {
      background: #FEF2F2; border: 1px solid #FECACA; color: #C53030;
      border-radius: 12px; padding: 0.75rem 1rem; font-size: 0.875rem; margin-bottom: 1rem;
    }
    label { display: block; font-size: 0.8125rem; font-weight: 600; color: #1F2933; margin-bottom: 0.375rem; }
    input[type="password"], input[type="text"] {
      display: block; width: 100%;
      background: #FFFCF7; border: 1px solid #E6E1D8;
      border-radius: 14px; padding: 0.875rem 1rem;
      color: #1F2933; font-size: 1rem; outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      margin-bottom: 0.875rem;
    }
    input[type="password"]:focus, input[type="text"]:focus {
      border-color: #6D5DF6; box-shadow: 0 0 0 4px rgba(109,93,246,0.08);
    }
    button[type="submit"] {
      margin-top: 0.5rem; display: block; width: 100%;
      background: linear-gradient(135deg, #6D5DF6 0%, #4F46E5 100%);
      color: #FFFFFF; border: none; border-radius: 14px;
      padding: 0.875rem; font-size: 1rem; font-weight: 700;
      letter-spacing: 0.02em; cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
    }
    button[type="submit"]:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(109,93,246,0.25); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/icon-192.png" alt="AgentDeck" />
      <h1>AgentDeck</h1>
      <p>centro de mando inteligente</p>
    </div>
    <div id="error-banner" class="error-banner" style="display:none">Passphrase incorrecta — intentá de nuevo.</div>
    <form method="POST" action="/login" id="login-form">
      <label for="username">Usuario</label>
      <input id="username" name="username" type="text" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" required />
      <label for="passphrase">Passphrase</label>
      <input id="passphrase" name="passphrase" type="password" autocomplete="current-password" required />
      <button type="submit">Entrar</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get("error") === "1") {
      document.getElementById("error-banner").style.display = "block";
    }
  </script>
</body>
</html>
